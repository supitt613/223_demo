name: Lotto 539 Automation Pro

on: 
  workflow_dispatch: # 允許手動觸發
  schedule:
    - cron: '30 13 * * *' # 晚上 21:30 (13:30 UTC) 執行爬蟲
    - cron: '0 2 * * *'   # 早上 10:00 (02:00 UTC) 執行預測

jobs:
  scrape_and_update_data:
    runs-on: ubuntu-latest
    # 修正重點：手動觸發或晚上定時都會執行，不被 needs 綁架
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event.schedule == '30 13 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Scrape and Update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/scrape_and_update.py

  send_prediction_notification:
    runs-on: ubuntu-latest
    # 修正重點：移除 needs 避免死結，手動或早上定時都會執行
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event.schedule == '0 2 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Prediction Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python scripts/send_prediction.py
