name: Lotto 539 Automation Pro

on: 
  workflow_dispatch: # 手動點擊時，兩個 Job 都會執行
  schedule:
    # 晚上 9:30 (13:30 UTC) 爬蟲更新 (539 約 20:30 開獎)
    - cron: '30 13 * * *'
    # 早上 10:00 (02:00 UTC) 預測通知
    - cron: '0 2 * * *'

jobs:
  scrape_and_update_data:
    runs-on: ubuntu-latest
    # 只有在「早上的預測定時」觸發時才跳過，手動或晚上定時都會跑
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 13 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Scrape and Update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/scrape_and_update.py

  send_prediction_notification:
    runs-on: ubuntu-latest
    # 移除 needs，改為獨立執行，或是手動觸發時執行
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Prediction Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python scripts/send_prediction.py
