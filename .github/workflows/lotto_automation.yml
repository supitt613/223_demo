name: Lotto 539 Automation

on: 
  workflow_dispatch: # 允許手動觸發
  schedule:
    # 每天晚上 10 點 (UTC+8) 執行爬蟲更新數據
    # UTC 時間為下午 2 點 (14:00)
    - cron: '0 14 * * *'
    # 每天早上 10 點 (UTC+8) 執行預測並發送 Line 通知
    # UTC 時間為凌晨 2 點 (02:00)
    - cron: '0 2 * * *'

jobs:
  scrape_and_update_data:
    runs-on: ubuntu-latest
    # 僅在每天晚上 10 點 (UTC+8) 的 cron 觸發時執行此 job
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 14 * * *'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scrape and Update Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/scrape_and_update.py

  send_prediction_notification:
    runs-on: ubuntu-latest
    needs: scrape_and_update_data # 確保在數據更新後再發送預測
    # 僅在每天早上 10 點 (UTC+8) 的 cron 觸發時執行此 job
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * *'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Send Prediction Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python scripts/send_prediction.py
